<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>

    <linearGradient id="coin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#facc15"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="16" fill="url(#bg)"/>

  <!-- Circular conversion arrows -->
  <path d="M18 28a14 14 0 0 1 24-10"
        fill="none"
        stroke="white"
        stroke-width="3.5"
        stroke-linecap="round"/>
  <polygon points="44,14 50,20 42,22" fill="white"/>

  <path d="M46 36a14 14 0 0 1-24 10"
        fill="none"
        stroke="white"
        stroke-width="3.5"
        stroke-linecap="round"/>
  <polygon points="20,50 14,44 22,42" fill="white"/>

  <!-- Coin -->
  <circle cx="32" cy="32" r="11" fill="url(#coin)"/>
  <text x="32" y="38"
        text-anchor="middle"
        font-family="Arial, sans-serif"
        font-size="14"
        font-weight="bold"
        fill="white">$</text>
</svg>